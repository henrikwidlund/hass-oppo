dimmer:
  name: Cycle dimmer
  description: Cycle the front-panel display brightness (On / Dim / Off).
  target:
    entity:
      integration: oppo_udp
      domain: media_player

pure_audio_toggle:
  name: Toggle Pure Audio
  description: Toggle Pure Audio mode (disables video output).
  target:
    entity:
      integration: oppo_udp
      domain: media_player

info_toggle:
  name: Toggle on-screen info
  description: Show or hide the on-screen display.
  target:
    entity:
      integration: oppo_udp
      domain: media_player

audio_language_toggle:
  name: Cycle audio language
  description: Cycle to the next audio language or channel.
  target:
    entity:
      integration: oppo_udp
      domain: media_player

subtitle_toggle:
  name: Cycle subtitle
  description: Cycle to the next subtitle language.
  target:
    entity:
      integration: oppo_udp
      domain: media_player

zoom:
  name: Cycle zoom
  description: Cycle zoom / aspect-ratio mode.
  target:
    entity:
      integration: oppo_udp
      domain: media_player

eject:
  name: Eject
  description: Toggle the disc tray open or closed.
  target:
    entity:
      integration: oppo_udp
      domain: media_player

fast_forward:
  name: Fast forward
  description: Fast forward (cycles through the player's fast-forward speeds).
  target:
    entity:
      integration: oppo_udp
      domain: media_player

fast_reverse:
  name: Fast reverse
  description: Fast reverse (cycles through the player's rewind speeds).
  target:
    entity:
      integration: oppo_udp
      domain: media_player

power_toggle:
  name: Toggle power
  description: Toggle the player between on and standby.
  target:
    entity:
      integration: oppo_udp
      domain: media_player
